{% extends "base.html" %}
{% block title %}Roles de empleado{% endblock %}
{% block content %}
<h2>Roles de {{ empleado.apellido }} {{ empleado.nombre }}</h2>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row">
        {% for r in roles %}
          <label>
            <input type="checkbox" name="roles" value="{{ r.id }}"
              {% if r.id in current_ids %}checked{% endif %}>
            {{ r.nombre }}
          </label><br>
        {% endfor %}
      </div>
      <div class="actions">
        <button type="submit">Guardar</button>
        <a href="{{ url_for('empleado_roles.listado') }}">Volver</a>
      </div>
    </form>
{% endblock %}
