{% extends "base.html" %}
{% block title %}Francos{% endblock %}
{% block content %}
<h2>Francos</h2>

    <a href="/francos/nuevo">Nuevo franco</a>

    <table>
      <tr>
        <th>Empleado</th>
        <th>Fecha</th>
        <th>Motivo</th>
        <th>Acciones</th>
      </tr>

      {% for f in francos %}
      <tr>
        <td>{{ f.apellido }} {{ f.nombre }}</td>
        <td>{{ f.fecha }}</td>
        <td>{{ f.motivo or "-" }}</td>
        <td>
          <a href="/francos/editar/{{ f.id }}">Editar</a>
          |
          <form method="post" action="/francos/eliminar/{{ f.id }}" style="display:inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit">Eliminar</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </table>

    <br>
    <a href="/dashboard">Volver</a>
{% endblock %}
