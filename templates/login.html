{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-brand">
  <div class="auth-brand-mark">CA</div>
  <div class="auth-brand-name">Control Asistencia</div>
  <div class="auth-brand-sub">Panel empresarial</div>
</div>

<form method="post" class="auth-card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <h2>Iniciar sesion</h2>
  <p>Ingrese con su usuario del panel web.</p>
  <div class="row">
    <label for="login-user">Usuario</label>
    <input id="login-user" name="username" placeholder="Usuario" autocomplete="username" required>
  </div>
  <div class="row">
    <label for="login-pass">Contrasena</label>
    <div class="password-field">
      <input id="login-pass" name="password" type="password" placeholder="Contrasena" autocomplete="current-password" required>
      <button type="button" class="password-toggle" aria-label="Mostrar contrasena" onclick="
        var i=document.getElementById('login-pass');
        var b=this;
        if(i.type==='password'){i.type='text';b.setAttribute('aria-label','Ocultar contrasena');b.classList.add('active');}
        else{i.type='password';b.setAttribute('aria-label','Mostrar contrasena');b.classList.remove('active');}
      ">
        <svg class="eye-show" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="eye-hide" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
  </div>
  {% if error %}
    <p class="error error-message">{{ error }}</p>
  {% endif %}
  <div class="actions">
    <button type="submit">Ingresar</button>
  </div>
</form>
{% endblock %}
