{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h2>Ingreso al panel</h2>
<p>Acceso restringido para administracion y RRHH.</p>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="row">
    <label>Usuario</label>
    <input name="username" placeholder="Usuario" required>
  </div>
  <div class="row">
    <label>Contrasena</label>
    <input name="password" type="password" placeholder="Contrasena" required>
  </div>
  <div class="actions">
    <button type="submit">Ingresar</button>
  </div>
  {% if error %}
    <p class="error" style="margin-top: 10px;">{{ error }}</p>
  {% endif %}
</form>
{% endblock %}
