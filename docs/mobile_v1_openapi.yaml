      summary: Lista paginada de justificaciones del empleado
      parameters:
        - name: desde
          in: query
          schema:
            type: string
            format: date
        - name: hasta
          in: query
          schema:
            type: string
            format: date
        - name: estado
          in: query
          schema:
            type: string
            enum: [pendiente, aprobada, rechazada]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Lista de justificaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJustificaciones'
    post:
      tags: [Justificaciones]
      summary: Crea una justificacion (estado inicial siempre pendiente)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JustificacionCreateRequest'
      responses:
        '201':
          description: Justificacion creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JustificacionItem'
        '400':
          description: Validacion fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/justificaciones/{id}:
    get:
      tags: [Justificaciones]
      summary: Detalle de una justificacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Justificacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JustificacionItem'
        '404':
          description: No encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Justificaciones]
      summary: Edita una justificacion (solo si esta pendiente)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JustificacionUpdateRequest'
      responses:
        '200':
          description: Justificacion actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JustificacionItem'
        '404':
          description: No encontrada
        '409':
          description: No esta en estado pendiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Justificaciones]
      summary: Retira una justificacion (solo si esta pendiente)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Eliminada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: No encontrada
        '409':
          description: No esta en estado pendiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

