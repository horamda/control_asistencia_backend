  # ---- Estadisticas ----
  /me/estadisticas:
    get:
      tags: [Estadisticas]
      summary: KPIs agregados del empleado para un rango
      parameters:
        - name: desde
          in: query
          schema:
            type: string
            format: date
          description: "Default: hoy - 29 dias"
        - name: hasta
          in: query
          schema:
            type: string
            format: date
          description: "Default: hoy. Sin fechas futuras. Max 366 dias."
      responses:
        '200':
          description: Estadisticas completas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadisticasResponse'
        '400':
          description: Fechas invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/dashboard:
    get:
      tags: [Estadisticas]
      summary: Dashboard consolidado para pantalla principal
      description: |
        Combina en una sola llamada:
        - Estadisticas de asistencia (KPIs, series diaria y semanal)
        - Resumen de legajo (historico, periodo, por tipo/severidad, recientes)
        - Vacaciones activas o futuras (desde hoy)
        - Francos proximos 30 dias
        - Horario actual asignado con dias de la semana
      parameters:
        - name: periodo
          in: query
          schema:
            type: string
            enum: [7d, 30d, mes_actual, 90d]
            default: 30d
          description: "Preset de rango. Ignorado si se envian desde/hasta."
        - name: desde
          in: query
          schema:
            type: string
            format: date
          description: "Override custom (ISO date)"
        - name: hasta
          in: query
          schema:
            type: string
            format: date
          description: "Override custom (ISO date). Sin fechas futuras. Max 366 dias."
      responses:
        '200':
          description: Dashboard completo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '400':
          description: Rango invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---- Justificaciones ----
  /me/justificaciones:
    get:
