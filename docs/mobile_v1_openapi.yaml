openapi: 3.0.3
info:
  title: Control Asistencia — Mobile API v1
  version: 1.12.0
  description: |
    API REST para la aplicacion Flutter de control de asistencia.
    Todos los endpoints (excepto auth) requieren header `Authorization: Bearer <token>`.
  contact:
    name: Equipo Backend
servers:
  - url: http://localhost:5000/api/v1/mobile
    description: Local
  - url: https://control-asistencia-backend-8gle.onrender.com/api/v1/mobile
    description: Produccion

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- Auth ---
    LoginRequest:
      type: object
      required: [dni, password]
      properties:
        dni:
          type: string
          example: "30111222"
        password:
          type: string
          example: "secreta123"

    EmpleadoBasico:
      type: object
      properties:
        id:
          type: integer
        dni:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        empresa_id:
          type: integer
        foto:
          type: string
          nullable: true
        imagen_version:
          type: string
          nullable: true

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        empleado:
          $ref: '#/components/schemas/EmpleadoBasico'

    # --- Asistencia ---
    AsistenciaItem:
      type: object
      properties:
        id:
          type: integer
        fecha:
          type: string
          format: date
        hora_entrada:
          type: string
          nullable: true
          example: "08:01"
        hora_salida:
          type: string
          nullable: true
          example: "16:04"
        metodo_entrada:
          type: string
          nullable: true
        metodo_salida:
          type: string
          nullable: true
        estado:
          type: string
          nullable: true
          enum: [ok, tarde, ausente, salida_anticipada]
        observaciones:
          type: string
          nullable: true
        gps_ok_entrada:
          type: boolean
          nullable: true
        gps_ok_salida:
          type: boolean
          nullable: true
        gps_distancia_entrada_m:
          type: number
          nullable: true
        gps_distancia_salida_m:
          type: number
          nullable: true
        gps_tolerancia_entrada_m:
          type: number
          nullable: true
        gps_tolerancia_salida_m:
          type: number
          nullable: true

    PaginatedAsistencias:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AsistenciaItem'
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    # --- Estadisticas ---
    EstadisticasKpis:
      type: object
      properties:
        puntualidad_pct:
          type: number
          description: "% de registros con estado ok"
        ausentismo_pct:
          type: number
        cumplimiento_jornada_pct:
          type: number
          description: "% de jornadas con entrada y salida"
        no_show_pct:
          type: number
          description: "% de ausencias sin justificacion aprobada"
        tasa_salida_anticipada_pct:
          type: number
        adherencia_pct:
          type: number
          description: "% de dias laborables con al menos una marca"
        horas_promedio:
          type: number
          description: "Horas promedio por jornada completa"
        horas_totales:
          type: number
          description: "Horas trabajadas totales en el periodo"
        gps_incidencias:
          type: integer
          description: "Cantidad de marcas con GPS rechazado"
        dias_laborables:
          type: integer
          description: "Dias habiles (lun-vie) en el rango"
        dias_con_registro:
          type: integer
        racha_ok:
          type: integer
          description: "Dias consecutivos con estado ok desde hoy hacia atras"

    EstadisticasResponse:
      type: object
      properties:
        periodo:
          type: object
          properties:
            desde:
              type: string
              format: date
            hasta:
              type: string
              format: date
            dias:
              type: integer
        totales:
          type: object
          properties:
            registros:
              type: integer
            ok:
              type: integer
            tarde:
              type: integer
            ausente:
              type: integer
            salida_anticipada:
              type: integer
            sin_estado:
              type: integer
        kpis:
          $ref: '#/components/schemas/EstadisticasKpis'
        jornadas:
          type: object
          properties:
            completas:
              type: integer
            con_marca:
              type: integer
            incompletas:
              type: integer
        justificaciones:
          type: object
          properties:
            total:
              type: integer
            pendientes:
              type: integer
            aprobadas:
              type: integer
            rechazadas:
              type: integer
            tasa_aprobacion_pct:
              type: number
            tasa_justificacion_pct:
              type: number
              description: "% de ausencias cubiertas con justificacion aprobada"
        vacaciones:
          type: object
          properties:
            eventos:
              type: integer
            dias:
              type: integer
        ausencias:
          type: object
          properties:
            total:
              type: integer
            sin_justificacion:
              type: integer
        series:
          type: object
          properties:
            diaria:
              type: array
              items:
                type: object
                properties:
                  fecha:
                    type: string
                    format: date
                  registros:
                    type: integer
                  ok:
                    type: integer
                  tarde:
                    type: integer
                  ausente:
                    type: integer
                  salida_anticipada:
                    type: integer
                  puntualidad_pct:
                    type: number
                  ausentismo_pct:
                    type: number
            semanal:
              type: array
              items:
                type: object
                properties:
                  desde:
                    type: string
                    format: date
                  hasta:
                    type: string
                    format: date
                  registros:
                    type: integer
                  ok:
                    type: integer
                  tarde:
                    type: integer
                  ausente:
                    type: integer
                  salida_anticipada:
                    type: integer
                  puntualidad_pct:
                    type: number

    # --- Justificacion ---
    JustificacionItem:
      type: object
      properties:
        id:
          type: integer
        asistencia_id:
          type: integer
          nullable: true
        asistencia_fecha:
          type: string
          format: date
          nullable: true
        motivo:
          type: string
        archivo:
          type: string
          nullable: true
        estado:
          type: string
          enum: [pendiente, aprobada, rechazada]
          default: pendiente
        created_at:
          type: string
          format: date-time

    JustificacionCreateRequest:
      type: object
      required: [motivo]
      properties:
        asistencia_id:
          type: integer
          nullable: true
        motivo:
          type: string
          example: "Enfermedad con certificado medico"
        archivo:
          type: string
          nullable: true
          example: "https://.../cert.pdf"

    JustificacionUpdateRequest:
      type: object
      required: [motivo]
      properties:
        motivo:
          type: string
        archivo:
          type: string
          nullable: true

    PaginatedJustificaciones:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JustificacionItem'
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    # --- Vacacion ---
    VacacionItem:
      type: object
      properties:
        id:
          type: integer
        empleado_id:
          type: integer
        fecha_desde:
          type: string
          format: date
        fecha_hasta:
          type: string
          format: date
          nullable: true
        observaciones:
          type: string

    VacacionRequest:
      type: object
      required: [fecha_desde, fecha_hasta]
      properties:
        fecha_desde:
          type: string
          format: date
        fecha_hasta:
          type: string
          format: date
        observaciones:
          type: string
          nullable: true

    PaginatedVacaciones:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VacacionItem'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    # --- Adelanto ---
    AdelantoItem:
      type: object
      properties:
        id:
          type: integer
        periodo:
          type: string
          example: "2026-04"
        periodo_year:
          type: integer
        periodo_month:
          type: integer
        fecha_solicitud:
          type: string
          format: date
        estado:
          type: string
          enum: [pendiente, aprobado, rechazado, cancelado]
          default: pendiente
        created_at:
          type: string
          format: date-time

    AdelantoEstadoResponse:
      type: object
      properties:
        periodo:
          type: string
          example: "2026-04"
        periodo_year:
          type: integer
        periodo_month:
          type: integer
        ya_solicitado:
          type: boolean
        adelanto:
          allOf:
            - $ref: '#/components/schemas/AdelantoItem'
          nullable: true

    # --- Horario ---
    AsignacionHorario:
      type: object
      properties:
        id:
          type: integer
        horario_id:
          type: integer
        horario_nombre:
          type: string
        fecha_desde:
          type: string
          format: date
        fecha_hasta:
          type: string
          format: date
          nullable: true

    DiaHorario:
      type: object
      properties:
        dia_semana:
          type: integer
          description: "1=Lunes ... 7=Domingo (ISO week day)"

    HorarioActualResponse:
      type: object
      properties:
        asignacion:
          allOf:
            - $ref: '#/components/schemas/AsignacionHorario'
          nullable: true
        dias:
          type: array
          items:
            $ref: '#/components/schemas/DiaHorario'

    # --- Franco ---
    FrancoItem:
      type: object
      properties:
        id:
          type: integer
        empleado_id:
          type: integer
        fecha:
          type: string
          format: date
        motivo:
          type: string

    PaginatedFrancos:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FrancoItem'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    # --- Legajo evento ---
    LegajoEventoItem:
      type: object
      properties:
        id:
          type: integer
        tipo_id:
          type: integer
        tipo_codigo:
          type: string
        tipo_nombre:
          type: string
        fecha_evento:
          type: string
          format: date
          nullable: true
        fecha_desde:
          type: string
          format: date
          nullable: true
        fecha_hasta:
          type: string
          format: date
          nullable: true
        titulo:
          type: string
        descripcion:
          type: string
        estado:
          type: string
          enum: [vigente, anulado]
        severidad:
          type: string
          nullable: true
          enum: [grave, media, leve]

    PaginatedLegajoEventos:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LegajoEventoItem'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    # --- Seguridad ---
    EventoSeguridadItem:
      type: object
      properties:
        id:
          type: integer
        tipo_evento:
          type: string
        severidad:
          type: string
          nullable: true
        alerta_fraude:
          type: boolean
        fecha:
          type: string
          format: date-time
        fecha_operacion:
          type: string
          format: date
          nullable: true
        hora_operacion:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lon:
          type: number
          nullable: true
        ref_lat:
          type: number
          nullable: true
        ref_lon:
          type: number
          nullable: true
        distancia_m:
          type: number
          nullable: true
        tolerancia_m:
          type: number
          nullable: true
        sucursal_id:
          type: integer
          nullable: true

    # --- Dashboard ---
    LegajoStats:
      type: object
      properties:
        historico:
          type: object
          properties:
            total:
              type: integer
            vigentes:
              type: integer
            anulados:
              type: integer
        periodo:
          type: object
          properties:
            total:
              type: integer
            graves:
              type: integer
            media:
              type: integer
            leve:
              type: integer
        por_tipo:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              total:
                type: integer
              pct:
                type: number
        por_severidad:
          type: array
          items:
            type: object
            properties:
              severidad:
                type: string
              total:
                type: integer
              pct:
                type: number
        recientes:
          type: array
          items:
            $ref: '#/components/schemas/LegajoEventoItem'

    AsignacionHorarioConDias:
      allOf:
        - $ref: '#/components/schemas/AsignacionHorario'
        - type: object
          properties:
            dias:
              type: array
              items:
                $ref: '#/components/schemas/DiaHorario'

    DashboardResponse:
      type: object
      properties:
        periodo:
          type: object
          properties:
            desde:
              type: string
              format: date
            hasta:
              type: string
              format: date
            preset:
              type: string
              enum: [7d, 30d, mes_actual, 90d, custom]
            dias_habiles:
              type: integer
        asistencia:
          $ref: '#/components/schemas/EstadisticasResponse'
        legajo:
          $ref: '#/components/schemas/LegajoStats'
        vacaciones_activas:
          type: array
          items:
            $ref: '#/components/schemas/VacacionItem'
        francos_proximos:
          type: array
          items:
            $ref: '#/components/schemas/FrancoItem'
        horario_actual:
          allOf:
            - $ref: '#/components/schemas/AsignacionHorarioConDias'
          nullable: true

    # --- Comunes ---
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

security:
  - BearerAuth: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ---- Auth ----
  /auth/login:
    post:
      tags: [Auth]
      summary: Login con DNI y password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token JWT + datos del empleado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renueva el token JWT
      responses:
        '200':
          description: Nuevo token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  # ---- Perfil ----
  /me:
    get:
      tags: [Perfil]
      summary: Perfil del empleado autenticado
      responses:
        '200':
          description: Datos del empleado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoBasico'

  /me/config-asistencia:
    get:
      tags: [Perfil]
      summary: Configuracion de asistencia de la empresa
      responses:
        '200':
          description: Config
          content:
            application/json:
              schema:
                type: object
                properties:
                  empresa_id:
                    type: integer
                  requiere_qr:
                    type: boolean
                  requiere_foto:
                    type: boolean
                  requiere_geo:
                    type: boolean
                  tolerancia_global:
                    type: integer
                  cooldown_scan_segundos:
                    type: integer
                  intervalo_minimo_fichadas_minutos:
                    type: integer
                  metodos_habilitados:
                    type: array
                    items:
                      type: string

  /me/perfil:
    put:
      tags: [Perfil]
      summary: Actualiza perfil (JSON o multipart)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                telefono:
                  type: string
                  nullable: true
                direccion:
                  type: string
                  nullable: true
                foto:
                  type: string
                  nullable: true
                eliminar_foto:
                  type: boolean
          multipart/form-data:
            schema:
              type: object
              properties:
                telefono:
                  type: string
                direccion:
                  type: string
                foto:
                  type: string
                foto_file:
                  type: string
                  format: binary
                eliminar_foto:
                  type: string
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  telefono:
                    type: string
                    nullable: true
                  direccion:
                    type: string
                    nullable: true
                  foto:
                    type: string
                    nullable: true
                  imagen_version:
                    type: string
                    nullable: true
        '400':
          description: Error de validacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/perfil/foto:
    delete:
      tags: [Perfil]
      summary: Elimina la foto de perfil
      responses:
        '200':
          description: Foto eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  foto:
                    type: string
                    nullable: true
                  imagen_version:
                    type: string
                    nullable: true

  /me/password:
    put:
      tags: [Perfil]
      summary: Cambia la password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password_actual, password_nueva]
              properties:
                password_actual:
                  type: string
                password_nueva:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          description: Password actual incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ---- Fichadas ----
  /me/qr:
    post:
      tags: [Fichadas]
      summary: Genera un QR de fichada
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                accion:
                  type: string
                  enum: [ingreso, egreso, auto]
                  default: auto
                scope:
                  type: string
                  enum: [empresa, empleado]
                  default: empresa
                tipo_marca:
                  type: string
                  enum: [jornada, desayuno, almuerzo, merienda, otro]
                  default: jornada
                vigencia_segundos:
                  type: integer
                  minimum: 30
                  maximum: 315360000
                  default: 2592000
      responses:
        '200':
          description: QR generado
          content:
            application/json:
              schema:
                type: object
                properties:
                  accion:
                    type: string
                  scope:
                    type: string
                  tipo_marca:
                    type: string
                  empresa_id:
                    type: integer
                  empleado_id:
                    type: integer
                    nullable: true
                  vigencia_segundos:
                    type: integer
                  expira_at:
                    type: string
                    format: date-time
                  qr_token:
                    type: string
                  qr_png_base64:
                    type: string

  /me/fichadas/scan:
    post:
      tags: [Fichadas]
      summary: Fichada via QR (ingreso/egreso automatico) — recomendado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qr_token, lat, lon]
              properties:
                qr_token:
                  type: string
                fecha:
                  type: string
                  format: date
                hora:
                  type: string
                  example: "08:03"
                tipo_marca:
                  type: string
                  enum: [jornada, desayuno, almuerzo, merienda, otro]
                lat:
                  type: number
                  example: -34.6037
                lon:
                  type: number
                  example: -58.3816
      responses:
        '201':
          description: Ingreso registrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  marca_id:
                    type: integer
                  accion:
                    type: string
                    example: ingreso
                  tipo_marca:
                    type: string
                  estado:
                    type: string
                  gps_ok:
                    type: boolean
                  distancia_m:
                    type: number
                  tolerancia_m:
                    type: number
                  alerta_fraude:
                    type: boolean
                  evento_id:
                    type: integer
                    nullable: true
                  total_marcas_dia:
                    type: integer
        '200':
          description: Egreso registrado (mismo esquema con accion=egreso)
        '403':
          description: Fuera de geocerca
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  gps_ok:
                    type: boolean
                  distancia_m:
                    type: number
                  tolerancia_m:
                    type: number
                  alerta_fraude:
                    type: boolean
                  evento_id:
                    type: integer
        '409':
          description: Cooldown (doble scan) o conflicto de jornada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: scan_cooldown
                  cooldown_segundos_restantes:
                    type: integer
                    nullable: true

  /me/fichadas/entrada:
    post:
      tags: [Fichadas]
      deprecated: true
      summary: Registra entrada (deprecated — usar /scan)
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Entrada registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  estado:
                    type: string

  /me/fichadas/salida:
    post:
      tags: [Fichadas]
      deprecated: true
      summary: Registra salida (deprecated — usar /scan)
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Salida registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  estado:
                    type: string

  # ---- Asistencias ----
  /me/horario-esperado:
    get:
      tags: [Asistencias]
      summary: Horario esperado para una fecha
      parameters:
        - name: fecha
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Horario esperado
          content:
            application/json:
              schema:
                type: object
                properties:
                  tiene_excepcion:
                    type: boolean
                  bloques:
                    type: array
                    items:
                      type: object
                      properties:
                        entrada:
                          type: string
                        salida:
                          type: string
                  tolerancia:
                    type: integer
        '404':
          description: Sin horario esperado

  /me/asistencias:
    get:
